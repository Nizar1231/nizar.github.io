<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>GitHub Pages Presentation</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/dracula.css">

</head>

<body>
<div class="reveal">
  <div class="slides">

    <!-- Slide 1 -->
    <section data-markdown>
      <textarea data-template>
# GitHub Pages 🚀
### By Nizar

A simple way to host websites for free
      </textarea>
    </section>

    <!-- Vertical slides -->
    <section>
      <section data-markdown>
        <textarea data-template>
## What is GitHub Pages?
- Free hosting service
- Supports HTML, CSS, JS
- Perfect for portfolios
        </textarea>
      </section>

      <section data-markdown>
        <textarea data-template>
## How it Works
- Upload files to GitHub
- Enable Pages
- Website is live automatically
        </textarea>
      </section>
    </section>

    <!-- Slide with image -->
    <section data-markdown>
      <textarea data-template>
## Example Website

![GitHub Pages](https://miro.medium.com/v2/resize:fit:1400/1*9sVhP8hNwqvZ6Kp0L0vQ9g.png)
      </textarea>
    </section>

    <!-- More slides -->
    <section data-markdown>
      <textarea data-template>
## Advantages
- Free
- Easy to use
- Integrated with GitHub
      </textarea>
    </section>

    <section data-markdown>
      <textarea data-template>
## Conclusion
GitHub Pages is a powerful tool for developers 🚀
      </textarea>
    </section>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reveal.js/plugin/markdown/markdown.js"></script>

<script>
  Reveal.initialize({
    hash: true,
    plugins: [ RevealMarkdown ]
  });
</script>

</body>
</html>
